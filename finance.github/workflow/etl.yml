name: Daily VN30 ETL Pipeline

on:
  schedule:
    # 09:00 giờ UTC tương đương với 16:00 (4 giờ chiều) giờ Việt Nam
    # Chạy từ thứ 2 đến thứ 6 hàng tuần (giai đoạn thị trường đóng cửa)
    - cron: "0 9 * * 1-5"
  workflow_dispatch: # Dòng này tạo ra một nút bấm giúp bạn có thể chủ động kích hoạt chạy thử bất kỳ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest # Mượn máy tính ảo chạy hệ điều hành Ubuntu mã nguồn mở

    steps:
      - name: Bước 1 - Tải code từ Github về máy ảo
        uses: actions/checkout@v3

      - name: Bước 2 - Cài đặt ngôn ngữ Python cho máy ảo
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Bước 3 - Cài đặt các thư viện cần thiết
        run: |
          pip install pandas vnstock supabase

      - name: Bước 4 - Chạy file Python và truyền khóa bảo mật vào
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main.py
